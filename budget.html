<h2 style="text-align:center;">Budget Calculator 💰</h2>

<div style="text-align:center;">
<input type="number" id="income" placeholder="Income"><br>
<input type="number" id="expense" placeholder="Expenses"><br>

<button id="calcBtn" type="button">Calculate</button>

<h3 id="result"></h3>
</div>
<script>
document.getElementById("calcBtn").onclick = function() {

    console.log("Button clicked");

    let income = parseFloat(document.getElementById("income").value);
    let expense = parseFloat(document.getElementById("expense").value);

    if(isNaN(income) || isNaN(expense)){
        alert("Enter values!");
        return;
    }

    let savings = income - expense;

    document.getElementById("result").innerHTML = "Savings: £" + savings;
};
</script>
